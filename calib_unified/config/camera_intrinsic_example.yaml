# UniCalib — 相机内参标定配置示例
sensor_id: cam_0
images_dir: /path/to/chessboard/images/
model: pinhole                  # pinhole | fisheye
output_dir: ./calib_output/camera_intrinsic

target:
  type: chessboard              # chessboard | circles | asym_circles
  cols: 9                       # 内角点列数
  rows: 6                       # 内角点行数
  square_size: 0.025            # 格子尺寸 (m)

min_images: 15
max_images: 100
max_rms_px: 1.5                 # 最大可接受重投影误差

# 图像采集建议:
#   - 覆盖图像各区域: 中心/四角/边缘
#   - 不同倾斜角度: ±30° 俯仰, ±30° 偏航
#   - 不同距离: 近/中/远
#   - 至少 20 张高质量图像
