# =============================================================================
# UniCalib 联合标定配置示例
# 支持五种标定: IMU内参 / 相机内参 / IMU-LiDAR / LiDAR-Camera / Camera-Camera
# =============================================================================

# ---------------------------------------------------------------------------
# 选择要执行的标定类型 (true = 执行, false = 跳过)
# ---------------------------------------------------------------------------
do_imu_intrinsic:           true   # IMU 内参 (Allan + 六面法)
do_camera_intrinsic:        true   # 相机内参 (棋盘格)
do_imu_lidar_extrinsic:     true   # IMU-LiDAR 外参
do_lidar_camera_extrinsic:  true   # LiDAR-Camera 外参
do_cam_cam_extrinsic:       false  # Camera-Camera 外参 (单目配置时关闭)
do_joint_bspline_refine:    true   # iKalibr B样条联合精化

verbose: true

# ---------------------------------------------------------------------------
# 输出目录
# ---------------------------------------------------------------------------
output_dir: ./calib_output/joint

# ---------------------------------------------------------------------------
# 传感器系统配置
# ---------------------------------------------------------------------------
sensors:
  - id: imu_0
    type: imu
    topic: /imu/data             # ROS topic (若使用 bag 读取)
    imu:
      rate_hz: 200.0
      model: scale_misalignment  # bias_only | scale_only | scale_misalignment

  - id: lidar_front
    type: lidar
    topic: /velodyne_points
    lidar:
      type: spinning              # spinning | solid_state
      scan_lines: 32
      rate_hz: 10.0

  - id: cam_left
    type: camera
    topic: /cam_left/image_raw
    camera:
      model: pinhole              # pinhole | fisheye
      width: 1280
      height: 720
      fps: 30.0
      rolling_shutter: false

  # 可选: 第二个相机 (用于 Camera-Camera 标定)
  # - id: cam_right
  #   type: camera
  #   topic: /cam_right/image_raw

# 参考 IMU ID (其他传感器的外参都以此为参考系)
reference_imu: imu_0

# ---------------------------------------------------------------------------
# 数据路径
# ---------------------------------------------------------------------------
data:
  # ROS2 bag 文件 (若使用 bag 读取)
  bag_file: /path/to/calibration_data.bag

  # 或者原始文件目录
  imu:
    imu_0: /path/to/imu_data/imu.csv   # CSV: timestamp,gx,gy,gz,ax,ay,az

  lidar:
    lidar_front: /path/to/lidar_scans/  # PCD 文件目录

  camera:
    cam_left:
      images_dir: /path/to/cam_left/images/  # 标定图像目录
      # 或者: intrinsic_yaml (若内参已知，跳过内参标定)
      # intrinsic_yaml: /path/to/cam_left_intrinsic.yaml

# ---------------------------------------------------------------------------
# IMU 内参标定配置
# ---------------------------------------------------------------------------
imu_intrinsic:
  static_gyro_thresh: 0.05    # 静态检测陀螺阈值 (rad/s)
  static_detect_window: 0.5   # 静态检测窗口 (s)
  min_static_frames: 50       # 最少静态帧数
  allan_num_tau_points: 50    # Allan τ 点数

# ---------------------------------------------------------------------------
# 相机内参标定配置
# ---------------------------------------------------------------------------
camera_intrinsic:
  min_images: 15
  max_images: 100
  target:
    type: chessboard            # chessboard | circles | asym_circles
    cols: 9
    rows: 6
    square_size: 0.025          # 方格尺寸 (m)
  model: pinhole                # pinhole | fisheye

# ---------------------------------------------------------------------------
# IMU-LiDAR 外参标定配置
# ---------------------------------------------------------------------------
imu_lidar:
  ndt_resolution: 1.0           # NDT 体素分辨率 (m)
  ndt_max_iter: 30
  spline_dt_s: 0.1              # B样条结时间间隔 (s)
  spline_order: 4               # 4=三次样条
  optimize_time_offset: true
  time_offset_init: 0.0         # 初始时间偏移估计 (s)
  time_offset_max: 0.2          # 最大时间偏移范围 (s)
  min_motion_rot_deg: 3.0       # 最小运动量 (deg)

# ---------------------------------------------------------------------------
# LiDAR-Camera 外参标定配置
# ---------------------------------------------------------------------------
lidar_camera:
  method: target                # target | edge | motion
  board_cols: 9
  board_rows: 6
  square_size: 0.025
  optimize_time_offset: true

# ---------------------------------------------------------------------------
# Camera-Camera 外参标定配置 (多目时使用)
# ---------------------------------------------------------------------------
cam_cam:
  method: chessboard            # chessboard | essential | ba
  fix_intrinsics: true          # 固定已标定的内参
  max_rms_px: 2.0

# ---------------------------------------------------------------------------
# 联合 B样条优化配置 (iKalibr)
# ---------------------------------------------------------------------------
joint_bspline:
  spline_order: 4
  spline_dt_s: 0.05
  max_iterations: 50
  optimize_gravity: true
  optimize_intrinsics: false    # 是否同时优化内参
