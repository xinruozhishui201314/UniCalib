# UniCalib — IMU 内参标定配置示例
sensor_id: imu_0
data_file: /path/to/imu/imu_static.csv   # 静止放置数据 (至少1小时)
output_dir: ./calib_output/imu_intrinsic

# 标定参数
calib:
  static_gyro_thresh: 0.05      # 静态判断阈值 (rad/s)
  static_detect_window: 0.5     # 检测窗口 (s)
  min_static_frames: 50

# CSV 格式说明:
# timestamp[s], gx[rad/s], gy[rad/s], gz[rad/s], ax[m/s²], ay[m/s²], az[m/s²]
# 数据采集建议:
#   1. IMU 静止放置在平稳面上 (避免振动)
#   2. 记录至少 1 小时的静态数据 (Allan 方差需要足够长的时间)
#   3. 六面法: 分别将 IMU 的六个面朝上静止放置各 5 分钟
